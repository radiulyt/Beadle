<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Beadle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #cc2828;
    --bg: #0e0d0b;
    --bg2: #1a1916;
    --text: #f0ece4;
    --text2: #9a9488;
    --text3: #5a554d;
    --border: rgba(240,236,228,0.1);
    --border2: rgba(240,236,228,0.18);
    --cream: #f0ece4;
  }

  @font-face {
    font-family: 'Bootle';
    src: url('fonts/Bootle-4B9l.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  html { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--bg);
    background-image: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(204,40,40,0.06) 0%, transparent 70%);
    padding: 0 1rem;
  }

  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 0 0.5rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.5rem;
  }

  .logo-main {
    font-family: 'Bootle', serif;
    font-weight: normal;
    font-size: 2rem;
    letter-spacing: -0.08em;
    color: var(--cream);
  }
  .logo-main em { color: var(--red); font-style: normal; }
  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 2px;
    display: block;
  }

  main {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 1.5rem;
    padding-bottom: 4rem;
    text-align: center;
  }

  .error-num {
    font-family: 'Playfair Display', serif;
    font-size: 8rem;
    line-height: 1;
    letter-spacing: -0.08em;
    color: var(--red);
    opacity: 0.8;
  }

  .error-msg {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
  }

  .error-sub {
    font-size: 12px;
    color: var(--text3);
  }

  .home-btn {
    display: inline-block;
    margin-top: 0.5rem;
    height: 42px;
    padding: 0 24px;
    line-height: 42px;
    border-radius: 8px;
    background: var(--red);
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.15s;
  }
  .home-btn:hover { background: #a82020; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-main">Bea<em>dle</em></div>
    <span class="logo-sub">daily beatles heardle</span>
  </div>
</header>

<main>
  <div class="error-num">404</div>
  <div class="error-msg">this page doesn't exist</div>
  <a href="/" class="home-btn">back to the game</a>
</main>

</body>
</html>
